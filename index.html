<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="App de Flashcards para estudo de Chinês (Mandarim) com Repetição Espaçada">
    <meta name="theme-color" content="#4CAF50">
    <title>Maestro SRS - Chinês</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>Maestro SRS</h1>
            <nav class="app-nav">
                <button id="btn-dashboard" class="nav-btn active" data-view="dashboard">Dashboard</button>
                <button id="btn-settings" class="nav-btn" data-view="settings">Configurações</button>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Views serão injetadas aqui pelo ui.js -->
        </main>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/srs.js"></script>
    <script src="js/exercise.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registrado:', reg.scope))
                    .catch(err => console.error('SW falhou:', err));
            });
        }
    </script>
</body>
</html>
